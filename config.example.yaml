# Job Hunter — configuration template.
# Copy this file to `config.yaml` and tune it to your own search.
# `config.yaml` is gitignored so your personal preferences never get committed.

# ── Search seeding ───────────────────────────────────────────────────────────
search_queries:
  keywords:
    - "urban designer"
    - "landscape architect"
    - "public realm"
    - "project designer"
    - "planning associate"
    - "streetscape"
    - "open space"
  location: "Your City, Province"
  location_radius_km: 40
  exclude_keywords:
    - "interior design"
    - "graphic design"
    - "game designer"
    - "instructional designer"
    - "web designer"

# ── Home / commute reference ─────────────────────────────────────────────────
# Commute is scored as estimated transit time from your home station to a job,
# using only free geocoding (Nominatim) + the station list in transit_data.py.
commute:
  home_station: "Your Home Station"
  # Optional: exact home address, used only by commute_precise.py's real-
  # transit-time refinement (door-to-door via Google, not just station-to-
  # station). Leave unset to fall back to home_station's coords. Has zero
  # effect on the free estimate/scoring above.
  # home_address: "123 Your Street, Your City"
  acceptable_lines: ["Line A", "Line B"]   # transit lines whose stations count
  walk_speed_kmh: 4.8
  minutes_per_station: 2.2
  interchange_penalty_min: 4
  score_buckets:                            # estimated one-way minutes -> score
    - { max_min: 20,  score: 1.0 }
    - { max_min: 35,  score: 0.85 }
    - { max_min: 50,  score: 0.6 }
    - { max_min: 70,  score: 0.35 }
    - { max_min: 9999, score: 0.15 }
  remote_score: 0.9
  unknown_location_score: 0.55
  # Optional real-transit-time refinement (Google Distance Matrix, transit
  # mode). Needs GOOGLE_MAPS_API_KEY in .env; skipped if missing. Jobs whose
  # free-estimate score lands within correction_margin of
  # delivery.min_score_for_digest get refined and re-scored before the digest
  # cut, so a coarse bucket boundary can't wrongly include/exclude a
  # near-miss job — every other shortlisted job just gets a more accurate
  # number shown (ranking unaffected). No API key = ranking stays exactly the
  # free/deterministic estimate.
  google_maps:
    enabled: false
    arrival_weekday_hour: 9
    correction_margin: 0.05

# ── Scoring ──────────────────────────────────────────────────────────────────
scoring:
  weights:
    commute:          0.28
    role_type:        0.18
    design_autonomy:  0.18
    mixed_role:       0.16
    salary:           0.12
    role_quality:     0.08
  preferences:
    salary_floor:     60000   # soft penalty below this, not a hard disqualifier
    salary_target:    85000   # at/above this gets full salary score
    remote_ok:        true
    hybrid_ok:        true
  target_roles:
    - "urban_design"
    - "landscape_arch"
    - "planning"
    - "civic_innovation"
  target_firms: []            # company names that earn a bonus
  target_firm_bonus: 0.10
  skills_bonus:
    terms:
      - "power bi"
      - "excel"
      - "workflow"
      - "process"
    per_hit: 0.02
    cap: 0.08
  penalties:
    admin_heavy: 0.4              # score is multiplied by this if is_admin_heavy (soft dock, not a kill)
    role_type_admin: 0.4          # same, for postings whose primary role_type is "admin"
    role_type_drafting_only: 0.4  # same, for postings whose primary role_type is "drafting_only"
    non_full_time: 0.5            # same, for part_time/casual/on_call/seasonal/temporary postings
    # Seniority/experience fit vs the candidate (enrichment's qualification verdict).
    # Without this a senior/director role they can't get outranks an entry-level
    # one they can. Multiplicative; qualified/overqualified/unknown are NOT docked.
    qualification:
      stretch: 0.85               # plausible with a good pitch — mild dock
      reach:   0.5                # needs years/credentials they lack — heavy dock, stays visible

# ── Hard disqualifiers (force score to 0) ────────────────────────────────────
# Role-type red flags above are soft penalties, not kills. Out-of-metro AND
# on-site postings are the one exception: not commutable at all, so there's no
# "strong fit despite it" case worth preserving.
disqualifiers:
  kill_if_outside_metro_and_onsite: true

# ── Candidate profile (feeds the LLM enrichment prompt) ──────────────────────
# Describe yourself here so the LLM can judge whether a posting actually fits.
profile:
  summary: >
    A short description of who you are and what kind of role you want.
  wants:
    - "The kinds of work and environments you want"
  avoids:
    - "The kinds of roles you want to filter out"
  design_software:
    - "Tools you know"
  differentiator: >
    Anything that sets you apart from other candidates.
  # Optional: paste your full resume text here so enrichment/cover-letter
  # prompts can ground claims in actual experience, not just the summary above.
  resume: >
    (optional — paste your full resume text here)
  # Used only by coverletter.py, to ground tone/voice — not fed into enrichment.
  # Paste 1-2 paragraphs of your own writing (an email, a past cover letter, a
  # bio) so the drafted letter sounds like you instead of generic AI prose.
  writing_sample: >
    (optional — paste a sample of your own writing here)

# ── Cross-source dedup ───────────────────────────────────────────────────────
# Aggregators and an org's own board can both list the same posting. After
# every scrape, jobs are grouped across DIFFERENT sources by fuzzy title +
# company match, and all but one "keeper" per group are hidden (marked
# duplicate_of, not deleted — `show.py --all` reveals them).
dedup:
  enabled: true
  title_similarity_threshold: 88     # rapidfuzz token_sort_ratio, 0-100
  company_similarity_threshold: 80
  description_similarity_threshold: 85
  # Direct/authoritative sources should win over aggregators as the kept copy;
  # lower index = kept preferentially. Sources not listed rank last.
  source_priority:
    - vancouver_gov
    - municipal_taleo
    - pibc
    - csla
    - jobbank
    - bcjobs
    - eluta
    - indeed
    - linkedin

# ── JobSpy-backed sources (Indeed, LinkedIn) ─────────────────────────────────
# See scrapers/_jobspy_common.py.
jobspy:
  results_wanted: 30
  hours_old: 168   # 7 days

# ── Enrichment ───────────────────────────────────────────────────────────────
enrichment:
  model: "claude-haiku-4-5"
  max_description_chars: 3000
  enabled: true

# ── Delivery ─────────────────────────────────────────────────────────────────
delivery:
  write_markdown: true
  digest_dir: "digests"
  send_email: true
  min_score_for_digest: 0.45
  max_jobs_in_digest: 25
  # A posting not seen on its source for this many days is flagged "stale" in the
  # report and web cockpit (hidden by default, toggleable). Jobs you're tracking
  # (a pipeline stage or marked interested) are never stale.
  stale_after_days: 30
  # A job sitting in the "applied" or "interviewing" pipeline stage this many
  # days with no forward movement gets a follow-up nudge on the cockpit's
  # pipeline board.
  follow_up_after_days: 7

# ── Sources to run ───────────────────────────────────────────────────────────
sources:
  indeed: true      # via JobSpy
  linkedin: true    # via JobSpy
  archinect: true
  pibc: true
  csla: true
  idealist: true
  dezeen: true
  firm_direct: true
  vancouver_gov: true      # City of Vancouver job board (SAP SuccessFactors)
  municipal_taleo: true    # nearby municipalities on the shared Taleo template
  north_shore: true        # District + City of North Vancouver (shared PeopleAdmin template)
  port_moody: true         # Govstack/njoyn board
  coquitlam: true          # Cegid/Talentsoft board embedded on the homepage
  concrete_cashmere: true  # small Vancouver interior design-build studio (firm-direct)
  jobbank: true            # Job Bank (jobbank.gc.ca), Government of Canada — national board
  bcjobs: true             # BCJobs.ca — hits its public JSON API directly
  eluta: false             # Eluta.ca — reCAPTCHA bot-wall after ~10 req/run; off by default, see source_eluta.py

# Direct firm careers pages to scrape, e.g.:
#   - { name: "Some Studio", careers_url: "https://example.com/careers" }
target_firms_scrape: []
